<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Beauty Room · Encuesta de experiencia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- ============================================================
     Web3Forms: envía el formulario directo a tu correo, sin backend.
     No necesita librería externa, solo una llamada fetch().
     ============================================================ -->

<style>
  :root{
    --ivory:#FBF7F0;
    --cream:#F3ECE0;
    --sand:#E4D5BE;
    --gold:#C9A96E;
    --taupe:#9C8C78;
    --brown:#4A3C2E;
    --terracotta:#B8785A;
    --terracotta-deep:#9C5F44;
    --success:#7A8B6F;
    --shadow: 0 20px 50px -20px rgba(74,60,46,0.35);
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 10%, rgba(201,169,110,0.18), transparent 45%),
      radial-gradient(circle at 90% 85%, rgba(184,120,90,0.14), transparent 50%),
      var(--ivory);
    font-family:'Jost', sans-serif;
    color:var(--brown);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .card-shell{
    width:100%;
    max-width:560px;
  }

  .brand{
    text-align:center;
    margin-bottom:22px;
  }
  .brand .mark{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:500;
    font-size:2rem;
    letter-spacing:0.5px;
    color:var(--brown);
  }
  .brand .sub{
    font-size:0.72rem;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--taupe);
    margin-top:2px;
  }

  .progress-track{
    height:3px;
    width:100%;
    background:var(--sand);
    border-radius:3px;
    overflow:hidden;
    margin-bottom:26px;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--gold), var(--terracotta));
    width:0%;
    transition:width .5s cubic-bezier(.65,0,.35,1);
  }

  .panel{
    background:rgba(255,255,255,0.55);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border:1px solid rgba(255,255,255,0.6);
    border-radius:22px;
    padding:38px 34px;
    box-shadow: var(--shadow);
    min-height:360px;
    display:flex;
    flex-direction:column;
    position:relative;
    overflow:hidden;
  }

  .step-count{
    font-size:0.72rem;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--terracotta-deep);
    font-weight:500;
    margin-bottom:10px;
  }

  .question{
    font-family:'Cormorant Garamond', serif;
    font-weight:500;
    font-size:1.55rem;
    line-height:1.35;
    color:var(--brown);
    margin:0 0 26px 0;
  }
  .question .req{
    color:var(--terracotta);
    font-size:1rem;
    vertical-align:super;
  }

  .field-body{ flex:1; }

  /* Rating 1-10 */
  .scale-row{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
  }
  @media (min-width:480px){
    .scale-row{ grid-template-columns:repeat(10,1fr); }
  }
  .scale-btn{
    aspect-ratio:1;
    border-radius:12px;
    border:1.5px solid var(--sand);
    background:rgba(255,255,255,0.5);
    font-family:'Jost', sans-serif;
    font-weight:500;
    font-size:0.95rem;
    color:var(--brown);
    cursor:pointer;
    transition:all .2s ease;
    display:flex; align-items:center; justify-content:center;
  }
  .scale-btn:hover{ border-color:var(--gold); transform:translateY(-2px); }
  .scale-btn.selected{
    background:linear-gradient(135deg, var(--gold), var(--terracotta));
    border-color:transparent;
    color:#fff;
    box-shadow:0 8px 20px -8px rgba(184,120,90,0.6);
  }
  .scale-labels{
    display:flex; justify-content:space-between;
    font-size:0.7rem; color:var(--taupe); margin-top:10px;
    letter-spacing:0.3px;
  }

  /* Radio options */
  .option-list{ display:flex; flex-direction:column; gap:10px; }
  .option{
    border:1.5px solid var(--sand);
    background:rgba(255,255,255,0.5);
    border-radius:14px;
    padding:14px 18px;
    cursor:pointer;
    font-size:0.98rem;
    color:var(--brown);
    transition:all .18s ease;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .option:hover{ border-color:var(--gold); }
  .option .dot{
    width:16px; height:16px; border-radius:50%;
    border:1.5px solid var(--taupe);
    flex-shrink:0;
    position:relative;
  }
  .option.selected{
    border-color:var(--terracotta);
    background:linear-gradient(135deg, rgba(201,169,110,0.16), rgba(184,120,90,0.1));
  }
  .option.selected .dot{ border-color:var(--terracotta); }
  .option.selected .dot::after{
    content:'';
    position:absolute; inset:3px;
    border-radius:50%;
    background:var(--terracotta);
  }

  textarea{
    width:100%;
    border:1.5px solid var(--sand);
    background:rgba(255,255,255,0.5);
    border-radius:14px;
    padding:14px 16px;
    font-family:'Jost', sans-serif;
    font-size:0.95rem;
    color:var(--brown);
    resize:vertical;
    min-height:100px;
    outline:none;
    transition:border-color .18s ease;
  }
  textarea:focus{ border-color:var(--gold); }
  textarea::placeholder{ color:var(--taupe); opacity:0.8; }

  .text-input{
    width:100%;
    border:1.5px solid var(--sand);
    background:rgba(255,255,255,0.5);
    border-radius:14px;
    padding:14px 16px;
    font-family:'Jost', sans-serif;
    font-size:0.98rem;
    color:var(--brown);
    outline:none;
    transition:border-color .18s ease;
  }
  .text-input:focus{ border-color:var(--gold); }
  .text-input::placeholder{ color:var(--taupe); opacity:0.8; }

  .hint{
    font-size:0.78rem;
    color:var(--taupe);
    margin-top:8px;
  }
  .error-msg{
    font-size:0.8rem;
    color:var(--terracotta-deep);
    margin-top:10px;
    opacity:0;
    transition:opacity .2s ease;
  }
  .error-msg.show{ opacity:1; }

  .nav-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:28px;
    padding-top:20px;
    border-top:1px solid var(--sand);
  }

  button.nav-btn{
    font-family:'Jost', sans-serif;
    font-weight:500;
    font-size:0.9rem;
    letter-spacing:0.4px;
    border:none;
    cursor:pointer;
    border-radius:30px;
    padding:12px 26px;
    transition:all .2s ease;
  }
  .btn-back{
    background:transparent;
    color:var(--taupe);
  }
  .btn-back:hover{ color:var(--brown); }
  .btn-back:disabled{ opacity:0; pointer-events:none; }

  .btn-next{
    background:linear-gradient(135deg, var(--gold), var(--terracotta));
    color:#fff;
    box-shadow:0 10px 24px -10px rgba(184,120,90,0.7);
  }
  .btn-next:hover{ transform:translateY(-1px); box-shadow:0 14px 28px -10px rgba(184,120,90,0.8); }
  .btn-next:active{ transform:translateY(0); }
  .btn-next:disabled{
    background:var(--sand);
    color:var(--taupe);
    box-shadow:none;
    cursor:not-allowed;
  }

  /* Final / thanks screen */
  .final-screen{
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    flex:1;
    padding:20px 0;
  }
  .final-bloom{
    width:64px; height:64px;
    margin-bottom:18px;
  }
  .final-title{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:500;
    font-size:1.7rem;
    color:var(--brown);
    margin-bottom:10px;
  }
  .final-text{
    font-size:0.95rem;
    color:var(--taupe);
    line-height:1.6;
    max-width:380px;
  }

  .spinner{
    width:20px; height:20px;
    border:2.5px solid rgba(255,255,255,0.4);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin .7s linear infinite;
    display:inline-block;
    vertical-align:middle;
    margin-right:8px;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .fade-step{
    animation: fadeSlide .35s ease;
  }
  @keyframes fadeSlide{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .send-error{
    background:rgba(184,120,90,0.12);
    border:1px solid var(--terracotta);
    color:var(--terracotta-deep);
    font-size:0.82rem;
    padding:10px 14px;
    border-radius:10px;
    margin-top:16px;
  }
</style>
</head>
<body>

<div class="card-shell">
  <div class="brand">
    <div class="mark">K-Beauty Room</div>
    <div class="sub">Encuesta de experiencia</div>
  </div>

  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="panel" id="panel">
    <!-- content injected by JS -->
  </div>
</div>

<script>
/* ================================================================
   CONFIGURACIÓN — EDITA SOLO ESTA LÍNEA
   ================================================================
   1) Entra a https://web3forms.com
   2) Escribe tu correo (corteshernandezfranco3b@gmail.com) y da clic
      en "Create Access Key"
   3) Te va a llegar un correo de confirmación a ese mismo correo,
      ábrelo y confirma
   4) Copia la Access Key que te muestra la página y pégala abajo
   ================================================================ */
const WEB3FORMS_ACCESS_KEY = "5df9b15f-5600-4fe9-a618-6094cf5c26c4";
/* ================================================================ */

const questions = [
  {
    id: "nombre",
    type: "text",
    text: "Antes de comenzar, ¿cómo te llamas?",
    placeholder: "Escribe tu nombre..."
  },
  {
    id: "rating",
    type: "scale10",
    text: "Del 1 al 10, ¿cómo calificarías tu experiencia en K-Beauty Room?"
  },
  {
    id: "disfrute",
    type: "textarea",
    text: "¿Qué fue lo que más disfrutaste de tu experiencia?",
    placeholder: "Cuéntanos con tus palabras..."
  },
  {
    id: "mejora",
    type: "textarea",
    text: "¿Hubo algún momento en el que sentiste que podríamos mejorar?",
    placeholder: "Todo comentario nos ayuda a crecer..."
  },
  {
    id: "atencion",
    type: "radio",
    text: "¿Cómo sentiste la atención que recibiste?",
    options: ["Excelente", "Muy buena", "Buena", "Regular"]
  },
  {
    id: "piel",
    type: "radio",
    text: "¿Cómo sentiste tu piel al terminar el tratamiento?",
    options: ["Mucho mejor de lo que esperaba", "Mejor", "Igual", "No noté cambios"]
  },
  {
    id: "recomendacion",
    type: "radio",
    text: "¿Nos recomendarías a una amiga o familiar?",
    options: ["Sí, definitivamente", "Probablemente sí", "No estoy segura", "No"]
  },
  {
    id: "cambio",
    type: "textarea",
    text: "Si pudieras cambiar o agregar una sola cosa a la experiencia, ¿qué sería?",
    placeholder: "Tu idea puede inspirar el siguiente cambio..."
  },
  {
    id: "extra",
    type: "textarea",
    text: "¿Hay algo más que te gustaría compartir con nosotras?",
    placeholder: "Este espacio es todo tuyo..."
  },
  {
    id: "autorizacion",
    type: "radio",
    text: "¿Nos autorizas a usar tu comentario (de forma anónima o con tu nombre) como testimonio en nuestras redes sociales?",
    options: ["Sí", "Sí, pero de forma anónima", "No"]
  }
];

let current = 0;
const answers = {};
const panel = document.getElementById("panel");
const progressFill = document.getElementById("progressFill");

function updateProgress(){
  const pct = (current / questions.length) * 100;
  progressFill.style.width = pct + "%";
}

function render(){
  updateProgress();
  const q = questions[current];
  const val = answers[q.id];
  let fieldHtml = "";

  if(q.type === "scale10"){
    let btns = "";
    for(let i=1;i<=10;i++){
      btns += `<button type="button" class="scale-btn ${val===i?'selected':''}" data-val="${i}">${i}</button>`;
    }
    fieldHtml = `
      <div class="scale-row" id="scaleRow">${btns}</div>
      <div class="scale-labels"><span>Nada satisfecha</span><span>Totalmente satisfecha</span></div>
    `;
  } else if(q.type === "radio"){
    let opts = "";
    q.options.forEach(opt => {
      const sel = val === opt ? "selected" : "";
      opts += `<div class="option ${sel}" data-val="${opt}"><span class="dot"></span>${opt}</div>`;
    });
    fieldHtml = `<div class="option-list" id="optionList">${opts}</div>`;
  } else if(q.type === "textarea"){
    fieldHtml = `<textarea id="taInput" placeholder="${q.placeholder||''}">${val||''}</textarea>`;
  } else if(q.type === "text"){
    fieldHtml = `<input type="text" id="textInput" class="text-input" placeholder="${q.placeholder||''}" value="${val||''}" autocomplete="off">`;
  }

  panel.innerHTML = `
    <div class="fade-step">
      <div class="step-count">Pregunta ${current+1} de ${questions.length}</div>
      <p class="question">${q.text} <span class="req">*</span></p>
      <div class="field-body">${fieldHtml}</div>
      <div class="error-msg" id="errorMsg">Esta pregunta es obligatoria.</div>
    </div>
    <div class="nav-row">
      <button type="button" class="nav-btn btn-back" id="backBtn" ${current===0?'disabled':''}>← Atrás</button>
      <button type="button" class="nav-btn btn-next" id="nextBtn">${current === questions.length-1 ? 'Enviar encuesta' : 'Siguiente →'}</button>
    </div>
  `;

  attachHandlers(q);
}

function attachHandlers(q){
  if(q.type === "scale10"){
    document.querySelectorAll("#scaleRow .scale-btn").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        answers[q.id] = parseInt(btn.dataset.val);
        document.querySelectorAll("#scaleRow .scale-btn").forEach(b=>b.classList.remove("selected"));
        btn.classList.add("selected");
        hideError();
      });
    });
  } else if(q.type === "radio"){
    document.querySelectorAll("#optionList .option").forEach(opt=>{
      opt.addEventListener("click", ()=>{
        answers[q.id] = opt.dataset.val;
        document.querySelectorAll("#optionList .option").forEach(o=>o.classList.remove("selected"));
        opt.classList.add("selected");
        hideError();
      });
    });
  } else if(q.type === "textarea"){
    const ta = document.getElementById("taInput");
    ta.addEventListener("input", ()=>{
      answers[q.id] = ta.value;
      if(ta.value.trim().length>0) hideError();
    });
  } else if(q.type === "text"){
    const ti = document.getElementById("textInput");
    ti.addEventListener("input", ()=>{
      answers[q.id] = ti.value;
      if(ti.value.trim().length>0) hideError();
    });
    ti.addEventListener("keydown", (e)=>{
      if(e.key === "Enter"){ e.preventDefault(); goNext(); }
    });
  }

  document.getElementById("backBtn").addEventListener("click", goBack);
  document.getElementById("nextBtn").addEventListener("click", goNext);
}

function hideError(){
  const err = document.getElementById("errorMsg");
  if(err) err.classList.remove("show");
}

function isAnswered(q){
  const val = answers[q.id];
  if(q.type === "textarea" || q.type === "text"){
    return typeof val === "string" && val.trim().length > 0;
  }
  return val !== undefined && val !== null && val !== "";
}

function goBack(){
  if(current > 0){
    current--;
    render();
  }
}

function goNext(){
  const q = questions[current];
  if(!isAnswered(q)){
    document.getElementById("errorMsg").classList.add("show");
    return;
  }
  if(current < questions.length - 1){
    current++;
    render();
  } else {
    submitSurvey();
  }
}

function submitSurvey(){
  progressFill.style.width = "100%";

  const summaryLines = questions.map(q => `${q.text}\n→ ${answers[q.id]}`).join("\n\n");

  panel.innerHTML = `
    <div class="final-screen fade-step">
      <div class="final-title">Enviando tus respuestas...</div>
      <div class="final-text"><span class="spinner"></span>Un momento, por favor.</div>
    </div>
  `;

  const formData = {
    access_key: WEB3FORMS_ACCESS_KEY,
    subject: `Nueva respuesta — ${answers.nombre || 'Encuesta K-Beauty Room'}`,
    from_name: answers.nombre || "K-Beauty Room · Encuesta",
    fecha: new Date().toLocaleString('es-MX'),
    respuestas: summaryLines
  };

  fetch("https://api.web3forms.com/submit", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Accept": "application/json" },
    body: JSON.stringify(formData)
  })
    .then(res => res.json())
    .then(data => {
      if(!data.success) throw new Error(data.message || "Error desconocido de Web3Forms");
      panel.innerHTML = `
        <div class="final-screen fade-step">
          <svg class="final-bloom" viewBox="0 0 64 64" fill="none">
            <circle cx="32" cy="32" r="30" stroke="#C9A96E" stroke-width="2"/>
            <path d="M32 18c3 5 3 9 0 14 -3-5-3-9 0-14z" fill="#B8785A"/>
            <path d="M18 32c5-3 9-3 14 0-5 3-9 3-14 0z" fill="#B8785A"/>
            <path d="M32 46c-3-5-3-9 0-14 3 5 3 9 0 14z" fill="#B8785A"/>
            <path d="M46 32c-5 3-9 3-14 0 5-3 9-3 14 0z" fill="#B8785A"/>
            <circle cx="32" cy="32" r="5" fill="#C9A96E"/>
          </svg>
          <div class="final-title">¡Gracias${answers.nombre ? ', ' + answers.nombre : ''}, por ser parte de esta primera etapa de K-Beauty Room! 💛</div>
          <div class="final-text">Tu opinión es muy valiosa y nos ayudará a crear una experiencia cada vez más especial.</div>
        </div>
      `;
    })
    .catch((err)=>{
      panel.innerHTML = `
        <div class="final-screen fade-step">
          <div class="final-title">No pudimos enviar tu respuesta</div>
          <div class="final-text">Verifica tu conexión e inténtalo de nuevo. Si el problema continúa, contáctanos directamente.</div>
          <div class="send-error">Detalle técnico: ${err && err.message ? err.message : 'Error de configuración de Web3Forms.'}</div>
        </div>
      `;
      console.error("Web3Forms error:", err);
    });
}

render();
</script>
</body>
</html>
